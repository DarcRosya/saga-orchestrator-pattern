services:
  database:
    image: postgres:16-bookworm
    container_name: saga-database
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB__USER}
      - POSTGRES_PASSWORD=${DB__PASS}
      - POSTGRES_DB=${DB__NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB__USER} -d ${DB__NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: saga_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: saga_migrator
    command: poetry run alembic upgrade head
    env_file:
      - .env
    environment:
      DB__HOST: database
    depends_on:
      database:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: saga_api
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      DB__HOST: database
      REDIS__R_HOST: redis
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
      migrator:
        condition: service_completed_successfully
    volumes:
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M


